name: SSH to MacOS VM (Pinggy Print Fix)

on: [workflow_dispatch]

jobs:
  ssh-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Khởi tạo SSH với Pinggy
      run: |
        # 1. Tự động lấy Public Key từ tài khoản GitHub của bạn để cấp quyền SSH
        mkdir -p ~/.ssh
        curl -s https://github.com/${{ github.actor }}.keys >> ~/.ssh/authorized_keys
        chmod 700 ~/.ssh
        chmod 600 ~/.ssh/authorized_keys
        
        # 2. Bật dịch vụ SSH trên hệ điều hành macOS
        sudo systemsetup -setremotelogin on
        
        # 3. Chạy Pinggy ngầm và ghi toàn bộ luồng log ra file pinggy.log
        ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 @a.pinggy.io R:22:localhost:22 > pinggy.log 2>&1 &
        
        # 4. Vòng lặp PRINT LOG liên tục cho đến khi tìm thấy link kết nối từ Pinggy
        echo "=========================================================="
        echo "ĐANG ĐỢI PINGGY CẤP ĐƯỜNG DẪN SSH..."
        echo "=========================================================="
        
        while ! grep -q "ssh -p" pinggy.log; do
          echo "[Pinggy] Đang kết nối..."
          cat pinggy.log # Ép print toàn bộ nội dung hiện tại ra màn hình log
          sleep 2
        done
        
        echo "=========================================================="
        echo "THÀNH CÔNG! THÔNG TIN KẾT NỐI MÁY ẢO CỦA BẠN:"
        grep "ssh -p" pinggy.log
        echo "Kết nối trực tiếp qua Private Key từ Codespaces (Không cần mật khẩu)"
        echo "=========================================================="
        
        # 5. Vòng lặp in log giữ máy ảo sống trong 5 tiếng
        echo "Bắt đầu giữ kết nối máy ảo..."
        SEC=0
        while [ $SEC -lt 18000 ]; do
          echo "[Keep-Alive] Máy ảo Mac đang hoạt động. Đã trôi qua: ${SEC} giây."
          sleep 60
          SEC=$((SEC+60))
        done
