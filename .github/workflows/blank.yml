name: SSH to MacOS VM (Pinggy No-Pass)

on: [workflow_dispatch]

jobs:
  ssh-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Khởi tạo SSH với Pinggy
      run: |
        # 1. Tự động lấy Public Key từ tài khoản GitHub của bạn để cấp quyền SSH
        mkdir -p ~/.ssh
        curl -s https://github.com/${{ github.actor }}.keys >> ~/.ssh/authorized_keys
        chmod 700 ~/.ssh
        chmod 600 ~/.ssh/authorized_keys
        
        # 2. Bật dịch vụ SSH trên hệ điều hành macOS
        sudo systemsetup -setremotelogin on
        
        # 3. Chạy Pinggy ngầm để mở cổng SSH công khai, lưu log ra file
        ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 @a.pinggy.io R:22:localhost:22 > pinggy.log &
        
        # 4. Đợi 5 giây để đường truyền ổn định
        sleep 5
        
        # 5. In thông tin kết nối lên màn hình log cho bạn lấy
        echo "=========================================================="
        echo "THÔNG TIN KẾT NỐI MÁY ẢO CỦA BẠN:"
        cat pinggy.log | grep -E "ssh -p|http" || cat pinggy.log
        echo "Kết nối trực tiếp qua Private Key từ máy tính của bạn (Không cần mật khẩu)"
        echo "=========================================================="
        
        # 6. Vòng lặp in log giữ máy ảo sống trong 5 tiếng
        echo "Bắt đầu giữ kết nối máy ảo..."
        SEC=0
        while [ $SEC -lt 18000 ]; do
          echo "[Keep-Alive] Máy ảo Mac đang hoạt động. Đã trôi qua: ${SEC} giây."
          sleep 60
          SEC=$((SEC+60))
        done
