name: SSH to MacOS VM

on: [workflow_dispatch] # Bật thủ công bằng tay

jobs:
  ssh-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Cài đặt Ngrok và Kích hoạt SSH
      env:
        NGROK_TOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
      run: |
        # Cài đặt ngrok qua Homebrew có sẵn trên Mac
        brew install ngrok/ngrok/ngrok
        ngrok config add-authtoken $NGROK_TOKEN
        
        # Đặt mật khẩu cho user hiện tại (runner) để bạn đăng nhập SSH
        echo "runner:MySecurePassword123" | sudo chpasswd
        
        # Bật dịch vụ SSH trên macOS
        sudo systemsetup -setremotelogin on
        
        # Mở cổng SSH (22) ra internet thông qua Ngrok
        echo "Mở cổng SSH..."
        ngrok tcp 22 &
        
        # Đợi một chút để Ngrok lấy URL
        sleep 5
        curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
        
        # Giữ cho máy ảo chạy liên tục trong 5 tiếng để bạn thao tác
        echo "Máy ảo sẽ giữ kết nối trong 5 tiếng. Đang đợi bạn..."
        sleep 18000
