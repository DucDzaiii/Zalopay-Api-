name: SSH to MacOS VM (Pinggy Fix)

on: [workflow_dispatch]

jobs:
  ssh-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Khởi tạo SSH với Pinggy
      run: |
        # 1. Đổi mật khẩu cho user 'runner' để bạn đăng nhập
        echo "runner:MySecurePassword123" | sudo chpasswd
        
        # 2. Bật dịch vụ SSH trên hệ điều hành macOS của máy ảo
        sudo systemsetup -setremotelogin on
        
        # 3. Chạy Pinggy ngầm để lấy cổng SSH công khai, ghi log ra file pinggy.log
        ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \(at)a.pinggy.io R:22:localhost:22 > pinggy.log &
        
        # 4. Đợi 5 giây để Pinggy thiết lập kết nối
        sleep 5
        
        # 5. Đọc file log và in ra thông tin kết nối cho bạn thấy
        echo "=========================================================="
        echo " THÔNG TIN KẾT NỐI MÁY ẢO CỦA BẠN:"
        cat pinggy.log | grep -E "ssh -p|http" || cat pinggy.log
        echo "Mật khẩu đăng nhập: MySecurePassword123"
        echo "=========================================================="
        
        # 6. Vòng lặp in log liên tục (Print giữ máy sống trong 5 tiếng)
        echo "Bắt đầu giữ kết nối máy ảo..."
        SEC=0
        while [ $SEC -lt 18000 ]; do
          echo "[Keep-Alive] Máy ảo Mac đang hoạt động. Đã trôi qua: ${SEC} giây."
          sleep 60
          SEC=$((SEC+60))
        done
