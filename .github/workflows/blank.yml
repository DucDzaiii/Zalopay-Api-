name: SSH to MacOS VM (Ngrok Fix)

on: [workflow_dispatch]

jobs:
  ssh-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Cấu hình và Chạy SSH Ngrok
      env:
        NGROK_TOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
      run: |
        # 1. Cài đặt Ngrok
        brew install ngrok/ngrok/ngrok
        ngrok config add-authtoken $NGROK_TOKEN
        
        # 2. Cấu hình User & Bật SSH trên Mac
        echo "runner:MySecurePassword123" | sudo chpasswd
        sudo systemsetup -setremotelogin on
        
        # 3. Khởi chạy Ngrok TCP ở chế độ ngầm nhưng ghi log ra file
        ngrok tcp 22 --log=stdout > ngrok.log &
        
        # 4. Đợi 5 giây cho Ngrok khởi tạo xong rồi lấy Link kết nối
        sleep 5
        echo "=========================================================="
        echo "ĐƯỜNG DẪN SSH CỦA BẠN:"
        curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
        echo "Mật khẩu đăng nhập: MySecurePassword123"
        echo "=========================================================="
        
        # 5. Vòng lặp VÔ HẠN (Print giữ máy sống trong 5 tiếng - 18000 giây)
        echo "Bắt đầu giữ kết nối máy ảo..."
        SEC=0
        while [ $SEC -lt 18000 ]; do
          echo "[Keep-Alive] Máy ảo đang hoạt động bình thường. Đã trôi qua: ${SEC} giây."
          sleep 60
          SEC=$((SEC+60))
        done
